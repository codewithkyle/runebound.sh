[package]
name = "dnd-desktop"
version = "0.1.0"
edition = "2024"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
dnd-core = { path = "../../core" }
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "2.0", features = [] }
tokio = { version = "1.48", features = ["macros", "rt-multi-thread"] }
